# Production: бот в Docker + Convex Cloud (база и админка — в облаке Convex)
#
# Перед запуском:
#   1. npm run deploy:convex  — задеплоить базу и админ-панель
#   2. cp .env.example .env   — заполнить CONVEX_URL, BOT_API_SECRET, BOT_SLUG
#   3. docker compose up -d --build
#
# Локальная разработка с convex dev на хосте:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: maivy-bot:latest
    container_name: maivy-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Медиафайлы можно обновлять без пересборки образа
      - ./assets:/app/assets:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x node > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
