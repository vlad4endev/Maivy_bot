# Локальная разработка: бот в Docker подключается к `npx convex dev` на хосте
#
# Терминал 1: npx convex dev
# Терминал 2: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# В .env укажите BOT_API_SECRET и BOT_SLUG; CONVEX_URL переопределяется ниже.

services:
  bot:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CONVEX_URL: http://host.docker.internal:3210
