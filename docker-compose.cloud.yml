# Только бот — если Convex уже в облаке (convex.cloud)
# docker compose -f docker-compose.cloud.yml up -d --build

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: maivy-bot:latest
    container_name: maivy-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MAX_WEBHOOK_PORT:-3000}:${MAX_WEBHOOK_PORT:-3000}"
    volumes:
      - ./assets:/app/assets:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x node > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
